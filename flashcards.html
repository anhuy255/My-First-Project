<style>

  .card .label { position:absolute; top:10px; left:16px; font-size:.75em; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .card-inner { width:100%; position:relative; }
  .face { font-size:1.15em; }
  .face.front { font-weight:600; }
  .face.back { display:none; color:var(--accent); }
  .card.revealed .face.front { color:var(--muted); font-weight:400; font-size:.95em; margin-bottom:14px; border-bottom:1px dashed #d0d7de; padding-bottom:14px; }
  .card.revealed .face.back { display:block; }
  .hint { text-align:center; color:var(--muted); font-size:.85em; margin-top:10px; }
  .nav { display:flex; gap:8px; margin-top:16px; }
  .nav button { flex:1; padding:12px; border:1px solid var(--primary); background:#fff; color:var(--primary); border-radius:6px; font-size:1em; font-weight:600; cursor:pointer; }
  .nav button:hover { background:var(--primary); color:#fff; }
  .nav button:disabled { opacity:.4; cursor:not-allowed; }

let deck = [];
let idx = 0;

function render() {
  const card = document.getElementById('card');
  const front = document.getElementById('front');
  const back = document.getElementById('back');
  const label = document.getElementById('cardLabel');
  const progress = document.getElementById('progress');
  card.classList.remove('revealed');
  if (!deck.length) {
    front.innerHTML = 'Chưa có thẻ. Chọn bộ và bấm "Lại từ đầu".';
    back.innerHTML = '';
    label.textContent = '';
    progress.textContent = '–';
    return;
  }
  const c = deck[idx];
  front.innerHTML = c.front;
  back.innerHTML = c.back;
  label.textContent = 'Thẻ #' + c.n;
  progress.textContent = (idx + 1) + ' / ' + deck.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === deck.length - 1;
}
function toggleCard() {
  const card = document.getElementById('card');
  card.classList.toggle('revealed');
  if (card.classList.contains('revealed') && deck.length) {
    try {
      const K = 'nailpa-flash-seen-v1';
      const seen = new Set(JSON.parse(localStorage.getItem(K) || '[]'));
      seen.add(deck[idx].n);
      localStorage.setItem(K, JSON.stringify([...seen]));
    } catch {}
  }
}
function next() { if (idx < deck.length - 1) { idx++; render(); } }
function prev() { if (idx > 0) { idx--; render(); } }
function loadDeck() {
  const v = document.getElementById('deckSelect').value;
  if (v === 'part1') deck = CARDS_PART_1.concat(CARDS_PART_2).slice();
  else if (v === 'part2') deck = CARDS_PART_3.concat(CARDS_PART_4).slice();
  else deck = ALL().slice();
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}
function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0;
  render();
}
document.getElementById('deckSelect').addEventListener('change', loadDeck);
document.getElementById('shuffleBtn').addEventListener('click', shuffle);
document.getElementById('resetBtn').addEventListener('click', loadDeck);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); toggleCard(); }
});
loadDeck();
</script>
</body>
</html>
